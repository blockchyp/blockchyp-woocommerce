name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  id-token: write
  contents: read
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate composer
        uses: php-actions/composer@8a65f0d3c6a1d17ca4800491a40b5756a4c164f3 # v6
        with:
          command: validate
          php_version: '8.3'

      - name: Cache dependencies
        id: composer-cache
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-composer-sync-${{ hashFiles('**/composer.lock') }}-

      - name: Install dependencies
        if: steps.composer-cache.outputs.cache-hit != 'true'
        uses: php-actions/composer@8a65f0d3c6a1d17ca4800491a40b5756a4c164f3 # v6
        with:
          php_version: '8.3'

      - name: Set default php version
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.3'

      - name: Lint
        run: vendor/friendsofphp/php-cs-fixer/php-cs-fixer fix --dry-run --diff

  push:

    needs: build

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate composer
        uses: php-actions/composer@8a65f0d3c6a1d17ca4800491a40b5756a4c164f3 # v6
        with:
          command: validate
          php_version: '8.3'

      - name: Clear dependencies
        run: rm -rf vendor

      - name: Cache dependencies
        id: composer-cache
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-composer-no-dev-${{ hashFiles('**/composer.lock') }}-

      - name: Install dependencies
        if: steps.composer-cache.outputs.cache-hit != 'true'
        uses: php-actions/composer@8a65f0d3c6a1d17ca4800491a40b5756a4c164f3 # v6
        with:
          php_version: '8.3'
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ vars.AWS_BLOCKCHYP_WOO_GITHUB_DEPLOY_ROLE }}
          aws-region: us-west-2
      - name: Sync to S3
        run: .github/deploy.sh s3
        env:
          TEST_S3_BUCKET: ${{ secrets.TEST_S3_BUCKET }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          WP_CLUSTER: ${{ secrets.WP_CLUSTER }}
          WP_SYNC_TASKDEF: ${{ secrets.WP_SYNC_TASKDEF }}
